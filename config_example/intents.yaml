# Polyglot Assist — example intents file
# Copy to /config/polyglot_assist/intents.yaml and adjust to your sentences.
#
# Each intent_name MUST already be registered as an `intent_script` entry in
# your HA configuration (e.g. /config/packages/voice_intent_wetter.yaml).
# Polyglot Assist matches the sentence, dispatches via intent.async_handle,
# and the matched language is injected as the `lang` slot so your existing
# Jinja templates can branch on it without changes.

intents:

  # ─────────────────────────────────────────────────────────────────────
  # Wetter Jetzt + Heute
  # The matching intent_script:WetterJetztUndHeute must exist (already
  # deployed at /config/packages/voice_intent_wetter.yaml in this setup).
  # ─────────────────────────────────────────────────────────────────────
  WetterJetztUndHeute:
    description: "Current temperature + today's forecast"
    sentences:
      de:
        # Klassische Kurzformen
        - "[wie ist|wie wird|wie ist denn|was ist mit] [dem|das] wetter"
        - "[wie ist|wie wird] [das] wetter heute"
        - "[wie wird|wie ist] [es] [denn] heute"
        - "wettervorhersage [heute]"
        - "wetter draußen"
        - "wetter in [uccle|brüssel|hause|zuhause]"
        - "wie warm wird [es] [heute]"
        - "wie kalt wird [es] [heute]"
        - "regnet es [heute]"
        - "scheint die sonne [heute]"
        # Längere realistische Tipp-Formen
        - "was [kannst du|sagst du|weisst du|hast du] [mir] über (das|den) wetter [heute] [sagen|erzählen]"
        - "[erzähl|sag|gib] mir [bitte] [etwas|was] über (das|den) wetter [heute]"
        - "[wie ist|wie sind] die [aktuelle|aktuellen] [wetter|temperaturen|wetterbedingungen]"
        - "[gib mir|zeig mir|sag mir] [den|das] wetter[bericht]? [heute]?"
        - "[das|den] wetterbericht [heute]"
      en:
        - "(what is|what's|how is) the weather"
        - "(what is|what's) the weather today"
        - "weather today"
        - "weather forecast"
        - "weather outside"
        - "is it (sunny|raining|cloudy) [today]"
        - "(how warm|how cold) is it [today]"
        - "(how warm|how cold) will it [be|get] [today]"
        - "[can you] tell me [about] the weather [today]?"
        - "[give me|show me] the (weather|forecast) [today]"
        - "what (are|is) the [current] weather conditions"
      fr:
        # Korrekte Formen
        - "(quel|quelle) (est|sera) la météo"
        - "(quel|quelle) (est|sera) la météo aujourd'hui"
        - "météo aujourd'hui"
        - "prévisions météo"
        - "il fait quel temps"
        - "fait-il (chaud|froid) [aujourd'hui]"
        - "il (pleut|fait beau|fait soleil) [aujourd'hui]"
        - "quel temps fait-il"
        # Tipp-/STT-Variants ("Quelle" statt "Quel", "fait-ils" Plural-Typo)
        - "(quel|quelle) temps [fait-il|fait-ils|fait il|fait ils|fait-elle]"
        - "(quel|quelle) (tempe|temp|temps|temps) (fait-il|fait-ils|fait il|fait ils)"
        - "[dis-moi|donne-moi|montre-moi] (la|le) météo [aujourd'hui]"
        - "que peux-tu (me|m') (dire|raconter) (sur|au sujet de) (la|le) (météo|temps)"

  # ─────────────────────────────────────────────────────────────────────
  # Wetter Morgen
  # ─────────────────────────────────────────────────────────────────────
  WetterMorgen:
    description: "Tomorrow's forecast"
    sentences:
      de:
        - "wetter morgen"
        - "[wie wird|wie ist] [das] wetter morgen"
        - "wettervorhersage morgen"
        - "wie [wird|warm|kalt] [es|ist es] morgen"
        - "regnet es morgen"
        - "wird es morgen [warm|kalt|regnen|schneien]"
        - "scheint morgen die sonne"
        # Lange Tipp-Formen
        - "was [kannst du|sagst du|weisst du|hast du] [mir] über (das|den) wetter morgen [sagen|erzählen]"
        - "[erzähl|sag|gib] mir [bitte] [etwas|was] über (das|den) wetter morgen"
        - "[gib mir|zeig mir|sag mir] [den|das] wetter[bericht]? [für|von|am]? morgen"
        - "[das|den] wetterbericht [für|von|am]? morgen"
      en:
        - "weather tomorrow"
        - "(what's|what is|how is) the weather tomorrow"
        - "weather forecast tomorrow"
        - "(how warm|how cold) (will|is) it [going to] [be] tomorrow"
        - "will it (rain|snow|be sunny) tomorrow"
        - "[can you] tell me [about] the weather tomorrow"
        - "[give me|show me] [the] (weather|forecast) (for|of)? tomorrow"
      fr:
        - "météo demain"
        - "(quel|quelle) (est|sera) la météo demain"
        - "prévisions météo demain"
        - "fera-t-il (chaud|froid) demain"
        - "il (pleut|va pleuvoir|va neiger) demain"
        - "quel temps fera-t-il demain"
        # STT/Tipp-Variants für demain ("de ma", "de main", "deux mains")
        - "(quel|quelle) temps (fera-t-il|fera-t-ils|fera t il) demain"
        - "(quel|quelle) (tempe|temp|temps|temps) (fera-t-il|fera-t-ils) demain"
        - "[dis-moi|donne-moi|montre-moi] (la|le) météo demain"
        - "que peux-tu (me|m') (dire|raconter) (sur|au sujet de) (la|le) (météo|temps) demain"
        # STT-Häufige Fehler
        - "metto (de ma|de main|deux mains)"
        - "(mettez|mets) (au|aux) deux mains"
        - "(météo|metto|meteo) (de ma|de main|demain|deux mains)"
